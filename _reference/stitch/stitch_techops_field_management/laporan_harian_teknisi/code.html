<main class="pt-20 pb-32 px-4 max-w-2xl mx-auto">

</section>
<div class="bg-surface-container-lowest rounded-xl shadow-[0_4px_16px_rgba(0,0,0,0.08)] p-gutter space-y-6">
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant">Tanggal Laporan</label>
<div class="relative">
<input class="w-full bg-white border border-slate-200 rounded-lg px-md py-3 font-body-md focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all" readonly="" type="text" value="15 Januari 2025"/>
<span class="material-symbols-outlined absolute right-3 top-3 text-slate-400">calendar_today</span>
</div>
</div>
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant">Ringkasan Kegiatan</label>
<textarea class="w-full bg-white border border-slate-200 rounded-lg px-md py-3 font-body-md focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all resize-none" placeholder="Masukkan ringkasan kegiatan..." rows="4">Melakukan maintenance rutin pada server rak A2 dan pembersihan filter pendingin ruang data center.</textarea>
</div>
<div class="space-y-2">

<span class="text-[10px] bg-slate-100 text-slate-500 px-2 py-0.5 rounded-full font-semibold uppercase tracking-wider">Opsional</span>
</div>
<textarea class="w-full bg-white border border-slate-200 rounded-lg px-md py-3 font-body-md focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all resize-none" placeholder="Tuliskan masalah jika ada..." rows="3">Konektor kabel kendor pada switch 4, sudah dilakukan pengencangan sementara namun perlu penggantian kabel patch dalam waktu dekat.</textarea>
</div>
<div class="space-y-4">
<label class="font-label-md text-label-md text-on-surface-variant">Jam Kerja</label>
<div class="flex items-center justify-between bg-surface-container-low p-4 rounded-xl border border-slate-100">
<div class="flex items-center gap-3">
<div class="w-10 h-10 bg-primary-fixed rounded-full flex items-center justify-center text-primary">
<span class="material-symbols-outlined">schedule</span>
</div>
<div>
<p class="font-label-md text-on-surface">Total Durasi</p>

</div>

<span class="material-symbols-outlined">remove</span>
</button>
<span class="font-headline-md text-headline-md px-2">8 Jam</span>
<button class="w-8 h-8 rounded-full flex items-center justify-center bg-primary text-white active:scale-90 transition-transform">
<span class="material-symbols-outlined">add</span>
</button>
</div>
</div>
</div>
