<!DOCTYPE html>

<html lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;family=DM+Mono:wght@500&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-primary-container": "#eeefff",
                    "on-primary-fixed": "#00174b",
                    "surface-container": "#ededf9",
                    "on-background": "#191b23",
                    "on-tertiary-fixed": "#360f00",
                    "on-tertiary": "#ffffff",
                    "on-tertiary-container": "#ffede6",
                    "surface-container-highest": "#e1e2ed",
                    "surface-container-high": "#e7e7f3",
                    "surface-tint": "#0053db",
                    "tertiary-container": "#bc4800",
                    "outline-variant": "#c3c6d7",
                    "error-container": "#ffdad6",
                    "surface-container-low": "#f3f3fe",
                    "tertiary": "#943700",
                    "on-surface": "#191b23",
                    "primary-fixed": "#dbe1ff",
                    "on-secondary-fixed": "#2a1700",
                    "on-error-container": "#93000a",
                    "inverse-primary": "#b4c5ff",
                    "on-secondary-container": "#684000",
                    "secondary": "#855300",
                    "surface": "#faf8ff",
                    "background": "#faf8ff",
                    "on-primary": "#ffffff",
                    "inverse-on-surface": "#f0f0fb",

                    "secondary-container": "#fea619",
                    "surface-dim": "#d9d9e5",
                    "surface-bright": "#faf8ff",

                    "secondary-fixed": "#ffddb8",
                    "tertiary-fixed": "#ffdbcd",
                    "on-surface-variant": "#434655",
                    "on-tertiary-fixed-variant": "#7d2d00",
                    "primary-container": "#2563eb",
                    "inverse-surface": "#2e3039",
                    "tertiary-fixed-dim": "#ffb596",
                    "surface-container-lowest": "#ffffff",
                    "secondary-fixed-dim": "#ffb95f",
                    "primary": "#004ac6",
                    "outline": "#737686"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "lg": "24px",
                    "gutter": "16px",
                    "sm": "8px",
                    "md": "16px",
                    "xs": "4px",
                    "xl": "32px",
                    "margin": "16px",
                    "base": "4px"
            },
            "fontFamily": {
                    "code-brand": ["DM Mono"],
                    "display": ["Inter"],
                    "label-md": ["Inter"],
                    "headline-lg": ["Inter"],
                    "body-lg": ["Inter"],
                    "body-md": ["Inter"],
                    "headline-md": ["Inter"]
            },
            "fontSize": {
                    "code-brand": ["18px", {"lineHeight": "1", "fontWeight": "500"}],
                    "display": ["32px", {"lineHeight": "1.2", "fontWeight": "700"}],
                    "label-md": ["12px", {"lineHeight": "1", "letterSpacing": "0.02em", "fontWeight": "600"}],
                    "headline-lg": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}],
                    "body-lg": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "body-md": ["14px", {"lineHeight": "1.5", "fontWeight": "400"}],
                    "headline-md": ["20px", {"lineHeight": "1.4", "fontWeight": "600"}]

          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #F0F4FF;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body-md text-on-background selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- Top AppBar - Following Shared Components Logic (Task-Focused: Suppress Global Nav) -->
<header class="fixed top-0 left-0 w-full z-50 flex items-center px-4 h-16 bg-white shadow-sm border-b border-slate-100">
<button class="p-2 mr-2 active:opacity-70 transition-opacity rounded-full hover:bg-slate-50">
<span class="material-symbols-outlined text-slate-900" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-display text-headline-md font-semibold text-slate-900">Buat Tugas Baru</h1>
</header>
<main class="pt-20 pb-24 px-gutter max-w-2xl mx-auto">
<!-- Content Canvas -->
<div class="bg-white rounded-xl shadow-[0_4px_16px_rgba(0,0,0,0.08)] p-6 md:p-8">
<form action="#" class="space-y-6" method="POST">
<!-- Judul Tugas -->
<div class="space-y-2">
<label class="font-label-md text-on-surface-variant flex items-center gap-1" for="judul">
                        Judul Tugas
                    </label>
<input class="w-full px-4 py-3 bg-white border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-slate-400" id="judul" name="judul" placeholder="Contoh: Perbaikan Server Utama" type="text"/>
</div>
<!-- Deskripsi -->
<div class="space-y-2">
<label class="font-label-md text-on-surface-variant" for="deskripsi">Deskripsi</label>
<textarea class="w-full px-4 py-3 bg-white border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-slate-400" id="deskripsi" name="deskripsi" placeholder="Detail langkah-langkah atau masalah..." rows="4"></textarea>
</div>
<!-- Assign To -->
<div class="space-y-2">
<label class="font-label-md text-on-surface-variant" for="assign">Assign To</label>
<div class="relative group">
<select class="w-full appearance-none px-4 py-3 bg-white border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all pr-10" id="assign" name="assign">
<option value="">Pilih Anggota Tim</option>
<option value="1">Budi Santoso</option>
<option value="2">Siti Aminah</option>
<option value="3">Andi Wijaya</option>
</select>
<div class="absolute inset-y-0 right-0 flex items-center px-3 pointer-events-none text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="expand_more">expand_more</span>
</div>
</div>
<!-- Selected Avatars Mockup -->
<div class="flex -space-x-2 pt-2">
<div class="w-8 h-8 rounded-full bg-primary flex items-center justify-center text-white font-label-md ring-2 ring-white">BS</div>
<div class="w-8 h-8 rounded-full bg-secondary flex items-center justify-center text-white font-label-md ring-2 ring-white">SA</div>
</div>
</div>
<!-- Prioritas -->
<div class="space-y-2">
<label class="font-label-md text-on-surface-variant">Prioritas</label>
<div class="flex flex-wrap gap-3">
<label class="cursor-pointer group">
<input class="sr-only peer" name="priority" type="radio" value="low"/>
<div class="px-5 py-2 rounded-full border border-outline-variant text-body-md font-medium peer-checked:bg-on-primary-container peer-checked:text-on-primary-fixed-variant peer-checked:border-primary transition-all flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-slate-400"></span>
                                Low
                            </div>
</label>
<label class="cursor-pointer group">
<input checked="" class="sr-only peer" name="priority" type="radio" value="medium"/>
<div class="px-5 py-2 rounded-full border border-outline-variant text-body-md font-medium peer-checked:bg-secondary-container/10 peer-checked:text-on-secondary-container peer-checked:border-secondary transition-all flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-secondary"></span>
                                Medium
                            </div>
</label>
<label class="cursor-pointer group">
<input class="sr-only peer" name="priority" type="radio" value="high"/>
<div class="px-5 py-2 rounded-full border border-outline-variant text-body-md font-medium peer-checked:bg-error-container/20 peer-checked:text-error peer-checked:border-error transition-all flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-error"></span>
                                High
                            </div>
</label>
</div>
</div>
<!-- Bento Grid Section for Dates and Location -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- Deadline -->
<div class="space-y-2">
<label class="font-label-md text-on-surface-variant flex items-center gap-1" for="deadline">
<span class="material-symbols-outlined text-[16px]" data-icon="event">event</span>
                            Deadline
                        </label>
<input class="w-full px-4 py-3 bg-white border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" id="deadline" name="deadline" type="date"/>
</div>
<!-- Lokasi -->
<div class="space-y-2">
<label class="font-label-md text-on-surface-variant flex items-center gap-1" for="lokasi">
<span class="material-symbols-outlined text-[16px]" data-icon="location_on">location_on</span>
                            Lokasi
                        </label>
<input class="w-full px-4 py-3 bg-white border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-slate-400" id="lokasi" name="lokasi" placeholder="e.g. Data Center A" type="text"/>
</div>
</div>
<!-- Image Placeholder for Context -->
<div class="mt-8 rounded-xl overflow-hidden aspect-video bg-surface-container relative group">
<img class="w-full h-full object-cover opacity-60" data-alt="A clean and modern high-tech server room with glowing blue LED indicator lights reflected on a polished white floor. The environment is spacious and well-lit with professional cool-toned lighting, conveying a sense of reliability and operational excellence. Minimalist server racks are arranged in an orderly fashion, fitting the TechOps theme perfectly." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCCPBfdhyWjSKGKX30azydMqwilP8LNi1EMZNc44dN8LwmrjauFKAC_5hgt0nmwRkd6gVj0aVwVr18A4SEEzQ6nSusRlC64IMdCByVCnbpk-NNo55kHOzoXv2uQcV2AsSkVjPG1d62rL73IAfvynwnfG9UWG5kIMz5Na-l6rMQtHJVdN9-72WFr_g61Y_IWtvqGPyJ6a2GowYpbLnDO0rEGTiD_1Vh2OCpDnohDvL6KkKeDjMPnM_GE0m2Ck_BMNsgBiOqbV72wpWwK"/>
<div class="absolute inset-0 flex items-center justify-center p-6 text-center">
<p class="font-label-md text-on-surface-variant bg-white/80 backdrop-blur-sm px-4 py-2 rounded-full shadow-sm">
                            Lampirkan foto pendukung jika diperlukan
                        </p>
</div>
</div>
</form>
</div>
</main>
<!-- Footer Action - Using Brand Anchors for Primary Color & Full Width -->
<div class="fixed bottom-0 left-0 w-full p-4 bg-white border-t border-slate-100 flex gap-4 md:px- gutter z-50">
<button class="w-full bg-primary-container text-white font-label-md py-4 rounded-full shadow-sm hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
<span class="material-symbols-outlined" data-icon="save">save</span>
            Simpan Tugas
        </button>
</div>
</body></html>
